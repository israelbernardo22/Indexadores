name: Monitor Indexadores

on:
  schedule:
    # Roda dia 10 de cada mês às 12:00 BRT (15:00 UTC).
    # Formato: minuto hora dia-do-mês mês dia-da-semana
    - cron: '0 15 10 * *'
  workflow_dispatch:  # permite rodar manualmente pela aba "Actions"

permissions:
  contents: write  # necessário pro job commitar o estado.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests

      - name: Rodar verificação
        env:
          # E-mail
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO:  ${{ secrets.EMAIL_TO }}
          # WhatsApp (CallMeBot)
          WHATSAPP_PHONE:  ${{ secrets.WHATSAPP_PHONE }}
          WHATSAPP_APIKEY: ${{ secrets.WHATSAPP_APIKEY }}
        run: python check_indices.py

      - name: Commit do estado atualizado
        run: |
          if [[ -n $(git status --porcelain estado.json) ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add estado.json
            git commit -m "chore: atualiza estado dos indexadores"
            git push
          else
            echo "Nada a commitar."
          fi
